# Formato principal do prompt
format = """
$directory\
$git_branch\
$nodejs\
$python\
$golang\
$rust\
$character
"""

# DiretГіrio (estilo padrГЈo, mas pode customizar se quiser)
[directory]
style = "fg:#a6e3a1"

# Git branch (seu estilo original)
[git_branch]
format = "[оӮ¶]($style)[[пҮ“ ](bg:#89b4fa fg:#49628a bold)$branch](bg:#89b4fa fg:#4c4f69)[оӮҙ ]($style)"
style = "bg:#1a1b26 fg:#89b4fa"

# VersГЈo do Node.js (aparece se houver package.json ou node_modules)
[nodejs]
format = "[оңҳ v$version](fg:#71a5cf)"
style = "fg:#71a5cf"

# VersГЈo do Python (aparece se houver .py, requirements.txt, etc.)
[python]
format = "[оҲө v$version](fg:#4c9b6f)"
style = "fg:#4c9b6f"

# VersГЈo do Go (aparece se houver go.mod ou .go)
[golang]
format = "[оҳ§ v$version](fg:#7fd4f4)"
style = "fg:#7fd4f4"

# VersГЈo do Rust (aparece se houver Cargo.toml)
[rust]
format = "[оһЁ v$version](fg:#e57373)"
style = "fg:#e57373"

# SГӯmbolo de prompt (seu original)
[character]
success_symbol = "[рҹһҲ](#a6e3a1 bold)"
error_symbol = "[рҹһҲ](#f38ba8)"
vicmd_symbol = "[рҹһҲ](#f9e2af)"
